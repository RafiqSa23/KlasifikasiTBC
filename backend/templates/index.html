<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TB X-Ray Detection - MobileNetV2</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <style>
      body {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }
      .main-container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 20px;
      }
      .header {
        text-align: center;
        color: white;
        margin-bottom: 40px;
      }
      .header h1 {
        font-size: 2.5rem;
        font-weight: 700;
      }
      .card {
        background: white;
        border-radius: 20px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        overflow: hidden;
      }
      .upload-area {
        border: 3px dashed #ddd;
        border-radius: 15px;
        padding: 40px;
        text-align: center;
        cursor: pointer;
        transition: all 0.3s;
      }
      .upload-area:hover {
        border-color: #667eea;
        background: #f8f9ff;
      }
      .upload-area i {
        font-size: 64px;
        color: #667eea;
        margin-bottom: 15px;
      }
      .btn-predict {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        padding: 12px 40px;
        border-radius: 50px;
        font-size: 1.1rem;
        font-weight: 600;
        margin-top: 20px;
        width: 100%;
      }
      .btn-predict:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
      }
      .preview-container {
        margin-top: 20px;
        text-align: center;
        display: none;
      }
      .preview-container img {
        max-width: 100%;
        max-height: 300px;
        border-radius: 10px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      }
      .result-container {
        padding: 30px;
        background: #f8f9fa;
        height: 100%;
        display: none;
      }
      .result-card {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 30px;
        border-radius: 15px;
      }
      .badge-normal {
        background: #10b981;
        color: white;
        padding: 8px 20px;
        border-radius: 50px;
        font-size: 1.2rem;
      }
      .badge-tb {
        background: #ef4444;
        color: white;
        padding: 8px 20px;
        border-radius: 50px;
        font-size: 1.2rem;
      }
      .confidence-bar {
        width: 100%;
        height: 20px;
        background: rgba(255, 255, 255, 0.2);
        border-radius: 10px;
        margin: 15px 0;
        overflow: hidden;
      }
      .confidence-fill {
        height: 100%;
        background: white;
        border-radius: 10px;
        transition: width 1s;
      }
      .loading {
        display: none;
        text-align: center;
        padding: 50px;
      }
      .spinner {
        width: 50px;
        height: 50px;
        border: 5px solid #f3f3f3;
        border-top: 5px solid #667eea;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 0 auto 20px;
      }
      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
      .error-message {
        color: #ef4444;
        padding: 20px;
        text-align: center;
        display: none;
      }
      .probability-item {
        display: flex;
        align-items: center;
        margin-bottom: 10px;
      }
      .probability-bar {
        flex: 1;
        height: 10px;
        background: rgba(255, 255, 255, 0.2);
        border-radius: 5px;
        margin: 0 15px;
        overflow: hidden;
      }
      .probability-fill {
        height: 100%;
        background: white;
        border-radius: 5px;
      }
    </style>
  </head>
  <body>
    <div class="main-container">
      <div class="header">
        <h1>TB X-Ray Detection Rafiq</h1>
        <p>Deteksi Tuberculosis dari Citra X-Ray menggunakan MobileNetV2</p>
        <span class="badge bg-light text-dark">Akurasi: >95%</span>
      </div>

      <div class="card">
        <div class="row g-0">
          <div class="col-md-6 p-4">
            <h4>
              <i class="fas fa-cloud-upload-alt me-2" style="color: #667eea"></i
              >Upload X-Ray
            </h4>

            <div
              class="upload-area"
              onclick="document.getElementById('fileInput').click()"
            >
              <i class="fas fa-cloud-upload-alt"></i>
              <h5>Click to Upload</h5>
              <p class="text-muted">JPG, PNG, JPEG (Max 16MB)</p>
            </div>

            <input
              type="file"
              id="fileInput"
              accept=".jpg,.jpeg,.png"
              style="display: none"
            />

            <div class="preview-container" id="previewContainer">
              <h6>Preview:</h6>
              <img id="imagePreview" src="" alt="Preview" />
            </div>

            <button
              class="btn-predict"
              id="predictBtn"
              onclick="predictImage()"
              disabled
            >
              <i class="fas fa-microscope me-2"></i>Analyze Image
            </button>
          </div>

          <div class="col-md-6">
            <div class="loading" id="loading">
              <div class="spinner"></div>
              <p>Analyzing image...</p>
            </div>

            <div class="error-message" id="errorMessage">
              <i class="fas fa-exclamation-triangle me-2"></i>
              <span id="errorText"></span>
            </div>

            <div class="result-container" id="resultContainer">
              <h4>
                <i class="fas fa-chart-bar me-2" style="color: #667eea"></i
                >Results
              </h4>

              <div class="result-card">
                <div class="text-center mb-4">
                  <span id="predictionBadge" class="badge-normal">-</span>
                </div>

                <h6>Confidence</h6>
                <div class="confidence-bar">
                  <div
                    class="confidence-fill"
                    id="confidenceBar"
                    style="width: 0%"
                  ></div>
                </div>
                <p class="text-end" id="confidenceText">0%</p>

                <h6 class="mt-4">Probabilities</h6>
                <div id="probabilitiesContainer"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      const fileInput = document.getElementById("fileInput");
      const previewContainer = document.getElementById("previewContainer");
      const imagePreview = document.getElementById("imagePreview");
      const predictBtn = document.getElementById("predictBtn");
      const loading = document.getElementById("loading");
      const resultContainer = document.getElementById("resultContainer");
      const errorMessage = document.getElementById("errorMessage");
      const errorText = document.getElementById("errorText");
      const predictionBadge = document.getElementById("predictionBadge");
      const confidenceBar = document.getElementById("confidenceBar");
      const confidenceText = document.getElementById("confidenceText");
      const probabilitiesContainer = document.getElementById(
        "probabilitiesContainer"
      );

      fileInput.addEventListener("change", function (e) {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = function (e) {
            imagePreview.src = e.target.result;
            previewContainer.style.display = "block";
            predictBtn.disabled = false;
            resultContainer.style.display = "none";
            errorMessage.style.display = "none";
          };
          reader.readAsDataURL(file);
        }
      });

      async function predictImage() {
        const file = fileInput.files[0];
        if (!file) return;

        loading.style.display = "block";
        resultContainer.style.display = "none";
        errorMessage.style.display = "none";
        predictBtn.disabled = true;

        const formData = new FormData();
        formData.append("file", file);

        try {
          const response = await fetch("/predict", {
            method: "POST",
            body: formData,
          });

          const data = await response.json();

          loading.style.display = "none";
          predictBtn.disabled = false;

          if (data.success) {
            // Display results
            predictionBadge.textContent = data.predicted_class;
            predictionBadge.className =
              data.predicted_class.toLowerCase() === "normal"
                ? "badge-normal"
                : "badge-tb";

            const confidencePercent = data.confidence * 100;
            confidenceBar.style.width = confidencePercent + "%";
            confidenceText.textContent = confidencePercent.toFixed(1) + "%";

            let probabilitiesHtml = "";
            for (const [className, prob] of Object.entries(
              data.probabilities
            )) {
              const probPercent = prob * 100;
              probabilitiesHtml += `
                            <div class="probability-item">
                                <span style="width: 100px;">${className}</span>
                                <div class="probability-bar">
                                    <div class="probability-fill" style="width: ${probPercent}%"></div>
                                </div>
                                <span style="width: 60px; text-align: right;">${probPercent.toFixed(
                                  1
                                )}%</span>
                            </div>
                        `;
            }
            probabilitiesContainer.innerHTML = probabilitiesHtml;

            resultContainer.style.display = "block";
          } else {
            errorText.textContent = data.error || "Prediction failed";
            errorMessage.style.display = "block";
          }
        } catch (error) {
          loading.style.display = "none";
          predictBtn.disabled = false;
          errorText.textContent = "Network error. Please try again.";
          errorMessage.style.display = "block";
        }
      }
    </script>
  </body>
</html>
